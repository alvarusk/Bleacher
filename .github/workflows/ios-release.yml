name: iOS Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    name: Build and Upload to TestFlight
    runs-on: macos-latest
    permissions:
      contents: read
    env:
      WORKSPACE: Bleacher.xcworkspace
      SCHEME: Bleacher
      APP_BUNDLE_ID: com.kingdomm.bleacher
      APPLE_DEVELOPMENT_TEAM: R24Q9H7VFW
      ARCHIVE_PATH: ${{ github.workspace }}/build/Bleacher.xcarchive
      EXPORT_PATH: ${{ github.workspace }}/build/export
      FASTLANE_API_KEY_PATH: ${{ github.workspace }}/build/fastlane/api_key.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode 26
        run: |
          XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode*26*.app' | sort | head -n 1)"
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 26 not found"
            ls /Applications
            exit 1
          fi
          sudo xcode-select -switch "$XCODE_APP/Contents/Developer"
          xcodebuild -version

      - name: Install fastlane
        run: sudo gem install fastlane -NV

      - name: Read project version
        id: version
        run: |
          MARKETING_VERSION="$(xcodebuild -showBuildSettings -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release | awk -F ' = ' '/^[[:space:]]*MARKETING_VERSION = / {print $2; exit}')"
          CURRENT_PROJECT_VERSION="$(xcodebuild -showBuildSettings -workspace "$WORKSPACE" -scheme "$SCHEME" -configuration Release | awk -F ' = ' '/^[[:space:]]*CURRENT_PROJECT_VERSION = / {print $2; exit}')"

          if [ -z "$MARKETING_VERSION" ]; then
            echo "Unable to read MARKETING_VERSION"
            exit 1
          fi

          if [ -z "$CURRENT_PROJECT_VERSION" ]; then
            echo "Unable to read CURRENT_PROJECT_VERSION"
            exit 1
          fi

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_VERSION="${GITHUB_REF_NAME#v}"
            if [ "$TAG_VERSION" != "$MARKETING_VERSION" ]; then
              echo "Tag version ($TAG_VERSION) does not match MARKETING_VERSION ($MARKETING_VERSION)"
              exit 1
            fi
          fi

          echo "marketing_version=$MARKETING_VERSION" >> "$GITHUB_OUTPUT"
          echo "current_project_version=$CURRENT_PROJECT_VERSION" >> "$GITHUB_OUTPUT"

      - name: Import signing assets
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/bleacher-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"
          CERT_PATH="$RUNNER_TEMP/apple_distribution.p12"
          PROFILE_SRC="$RUNNER_TEMP/bleacher.mobileprovision"
          PROFILE_DIR="$HOME/Library/MobileDevice/Provisioning Profiles"
          PROFILE_PLIST="$RUNNER_TEMP/bleacher-profile.plist"

          mkdir -p "$PROFILE_DIR"

          printf '%s' "$APPLE_CERTIFICATES_P12_BASE64" | base64 --decode > "$CERT_PATH"
          printf '%s' "$APPSTORE_API_PRIVATE_KEY" > "$RUNNER_TEMP/AuthKey_${APPSTORE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_IOS_APPSTORE_PROFILE_BASE64" | base64 --decode > "$PROFILE_SRC"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security default-keychain -s "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$APPLE_CERTIFICATES_P12_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security -T /usr/bin/xcodebuild
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security cms -D -i "$PROFILE_SRC" > "$PROFILE_PLIST"

          PROFILE_NAME="$(/usr/libexec/PlistBuddy -c 'Print :Name' "$PROFILE_PLIST")"
          PROFILE_UUID="$(/usr/libexec/PlistBuddy -c 'Print :UUID' "$PROFILE_PLIST")"
          install -m 0644 "$PROFILE_SRC" "$PROFILE_DIR/$PROFILE_UUID.mobileprovision"

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          api_key_path = Path(os.environ["FASTLANE_API_KEY_PATH"])
          api_key_path.parent.mkdir(parents=True, exist_ok=True)
          api_key = {
              "key_id": os.environ["APPSTORE_API_KEY_ID"],
              "issuer_id": os.environ["APPSTORE_ISSUER_ID"],
              "key": os.environ["APPSTORE_API_PRIVATE_KEY"],
              "duration": 1200,
              "in_house": False,
          }
          api_key_path.write_text(json.dumps(api_key, indent=2) + "\n", encoding="utf-8")
          PY

          {
            echo "PROFILE_NAME=$PROFILE_NAME"
            echo "PROFILE_UUID=$PROFILE_UUID"
          } >> "$GITHUB_ENV"

      - name: Create export options
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>teamID</key>
            <string>${APPLE_DEVELOPMENT_TEAM}</string>
            <key>compileBitcode</key>
            <false/>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadSymbols</key>
            <true/>
            <key>provisioningProfiles</key>
            <dict>
              <key>${APP_BUNDLE_ID}</key>
              <string>${PROFILE_NAME}</string>
            </dict>
          </dict>
          </plist>
          EOF

      - name: Archive app
        run: |
          xcodebuild archive \
            -workspace "$WORKSPACE" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$APPLE_DEVELOPMENT_TEAM" \
            PROVISIONING_PROFILE_SPECIFIER="$PROFILE_NAME" \
            CODE_SIGN_IDENTITY="Apple Distribution" \
            CURRENT_PROJECT_VERSION="${GITHUB_RUN_NUMBER}" \
            MARKETING_VERSION="${{ steps.version.outputs.marketing_version }}" \
            archive

      - name: Export IPA
        run: |
          mkdir -p "$EXPORT_PATH"
          xcodebuild -exportArchive \
            -archivePath "$ARCHIVE_PATH" \
            -exportPath "$EXPORT_PATH" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist"

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: bleacher-ios-ipa
          path: ${{ github.workspace }}/build/export/*.ipa
          if-no-files-found: error

      - name: Upload to TestFlight
        run: |
          IPA_PATH="$(find "$EXPORT_PATH" -maxdepth 1 -name '*.ipa' -print -quit)"
          if [ -z "$IPA_PATH" ]; then
            echo "IPA not found in $EXPORT_PATH"
            exit 1
          fi

          fastlane ios testflight \
            ipa_path:"$IPA_PATH" \
            api_key_path:"$FASTLANE_API_KEY_PATH"
