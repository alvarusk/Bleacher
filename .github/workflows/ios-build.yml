name: iOS Build

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Bleacher
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List project schemes
        run: xcodebuild -list -workspace Bleacher.xcworkspace

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -workspace Bleacher.xcworkspace \
            -scheme Bleacher \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build

