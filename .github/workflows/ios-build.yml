name: iOS CI

on:
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build Bleacher
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 26
        run: |
          XCODE_APP="$(find /Applications -maxdepth 1 -name 'Xcode*26*.app' | sort | head -n 1)"
          if [ -z "$XCODE_APP" ]; then
            echo "Xcode 26 not found"
            ls /Applications
            exit 1
          fi
          sudo xcode-select -switch "$XCODE_APP/Contents/Developer"

      - name: Show Xcode version
        run: xcodebuild -version

      - name: List project schemes
        run: xcodebuild -list -workspace Bleacher.xcworkspace

      - name: Build for iOS Simulator
        run: |
          xcodebuild \
            -workspace Bleacher.xcworkspace \
            -scheme Bleacher \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build
